# config/plastics_combined_future.yml

# Plastics model for combined workflow - reads pre-computed FinalDemand directly

model_class: 'plastics'
scenario: 'combined_future'

logging:
  level: 'INFO'

# Input path - same as fd-sv-gr since we save FinalDemand.csv there

input_data_path: 'data/fd-sv-gr_plastics/input'

customization:
  model_driven: 'final_demand'  # KEY DIFFERENCE: reads FinalDemand.csv directly
  lifetime_model_name: 'NormalLifetime'
  end_use_sectors: 'MainSectors'
  waste_not_for_recycling: ['Landfill', 'Incineration']

# Visualization disabled for combined workflow

visualization:
  inflow:
    do_visualize: False
  production:
    do_visualize: False
  outflow:
    do_visualize: False
  sankey:
    do_visualize: False
  dashboard:
    do_visualize: False

# Output to separate directory for combined results

output_path: 'data/combined_plastics_future/output'
do_export:
  pickle: False
  csv: True
selected_export:
  csv_selected_flows:
    - 'sysenv => Polymer market'
    - 'Polymer market => PRIMARY Plastics manufacturing'
    - 'Polymer market => SECONDARY Plastics manufacturing'
    - 'Plastics manufacturing => Plastics market'
    - 'Plastics market => End use stock'
    - 'End use stock => Waste collection'
    - 'Waste collection => Waste sorting'
    - 'Waste sorting => Sorted waste market'
    - 'Sorted waste market => Recycling'
    - 'Recycling => RECYCLATE sysenv'
    - 'Recycling => LOSSES sysenv'

  csv_selected_stocks:
    - 'End use stock'

  csv_slice_stocks:
    - 'time': [2023, 2030, 2040, 2050]